name: CI

on:
  push:
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync
      - name: Setup
        run: |
          cp config.example.yaml config.yaml
          git describe --tags --always 2>/dev/null > VERSION || echo "dev" > VERSION
      - run: uv run pytest tests/ -v --cov=. --cov-report=term-missing
      - name: Coverage check
        run: |
          COV=$(uv run pytest tests/ --cov=. --cov-report=term 2>&1 | grep "^TOTAL" | awk '{print $4}' | tr -d '%')
          echo "Coverage: ${COV}%"
          [ "$COV" -ge 80 ] || (echo "Below 80% threshold" && exit 1)

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo dev)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          docker build --build-arg VERSION=$VERSION -t poly-bot:$VERSION .

      - name: Install container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image poly-bot:${{ env.VERSION }} \
            --config container-structure-test.yaml
