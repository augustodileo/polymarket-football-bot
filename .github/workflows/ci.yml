name: CI

on:
  push:
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync
      - name: Setup
        run: |
          cp config.example.yaml config.yaml
          git describe --tags --always 2>/dev/null > VERSION || echo "dev" > VERSION
      - run: uv run pytest tests/ -v --cov=. --cov-report=term-missing
      - name: Coverage check
        run: |
          COV=$(uv run pytest tests/ --cov=. --cov-report=term 2>&1 | grep "^TOTAL" | awk '{print $4}' | tr -d '%')
          echo "Coverage: ${COV}%"
          [ "$COV" -ge 80 ] || (echo "Below 80% threshold" && exit 1)

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build & smoke test
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo dev)
          docker build --build-arg VERSION=$VERSION -t poly-bot:$VERSION .
          cp config.example.yaml config.yaml
          docker run --rm -v $(pwd)/config.yaml:/app/config.yaml poly-bot:$VERSION --ephemeral &
          sleep 15
          kill $! 2>/dev/null || true
          echo "Docker smoke test passed"
