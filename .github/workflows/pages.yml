name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: [dashboard/index.html]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save new HTML
          cp dashboard/index.html /tmp/index.html

          # Checkout existing gh-pages (preserves dashboard-data.json)
          git fetch origin gh-pages
          git checkout gh-pages

          # Update only the HTML
          cp /tmp/index.html index.html

          # Create placeholder data only if no data file exists yet
          if [ ! -f dashboard-data.json ]; then
            echo '{"summary":{"total_trades":0,"wins":0,"losses":0,"win_rate":0,"total_pnl":0,"total_staked":0,"roi":0},"open_positions":[],"scheduled_bets":[],"pnl_curve":[],"by_league":{},"by_day":{}}' > dashboard-data.json
          fi

          git add index.html dashboard-data.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update dashboard HTML" && git push origin gh-pages)
