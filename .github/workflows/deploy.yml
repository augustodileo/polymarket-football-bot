name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync
      - run: cp config.example.yaml config.yaml
      - run: uv run pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BOT_MODE,BANKROLL,POLYMARKET_PRIVATE_KEY,POLYMARKET_FUNDER
          script: |
            cd ~/poly-bot
            git pull origin main

            # Generate config from template + inject values
            cp config.example.yaml config.yaml

            # Non-sensitive config (from GitHub Variables)
            if [ -n "$BANKROLL" ]; then
              sed -i 's|bankroll: 10000|bankroll: '"$BANKROLL"'|' config.yaml
            fi

            # Secrets (from GitHub Secrets — only for live mode)
            if [ -n "$POLYMARKET_PRIVATE_KEY" ]; then
              sed -i 's|# polymarket_private_key: ""|polymarket_private_key: "'"$POLYMARKET_PRIVATE_KEY"'"|' config.yaml
            fi
            if [ -n "$POLYMARKET_FUNDER" ]; then
              sed -i 's|# polymarket_funder: ""|polymarket_funder: "'"$POLYMARKET_FUNDER"'"|' config.yaml
            fi

            # Build and restart
            sudo docker build -t poly-bot .
            sudo docker stop poly-bot 2>/dev/null || true
            sudo docker rm poly-bot 2>/dev/null || true
            sudo docker run -d --restart=always \
              -v $(pwd)/config.yaml:/app/config.yaml \
              -v $(pwd)/data:/app/data \
              --name poly-bot \
              poly-bot --${BOT_MODE:-paper}
            sleep 5
            sudo docker logs --tail 5 poly-bot
        env:
          # Variables (non-sensitive, visible in logs)
          BOT_MODE: ${{ vars.BOT_MODE }}
          BANKROLL: ${{ vars.BANKROLL }}
          # Secrets (encrypted, masked in logs)
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYMARKET_FUNDER: ${{ secrets.POLYMARKET_FUNDER }}
