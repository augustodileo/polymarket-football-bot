name: Deploy (manual)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Read deploy script
        run: echo "DEPLOY_SCRIPT=$(cat .github/deploy.sh | base64 -w0)" >> $GITHUB_ENV
      - name: Deploy + smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BOT_MODE,BANKROLL,POLYMARKET_PRIVATE_KEY,POLYMARKET_FUNDER,GITHUB_TOKEN,GITHUB_REPO,PUSH_INTERVAL_SEC,DEPLOY_SCRIPT
          script: |
            echo "$DEPLOY_SCRIPT" | base64 -d | bash

            echo ""
            echo "=== Smoke Test ==="
            STATUS=$(sudo docker inspect poly-bot --format '{{.State.Status}}' 2>/dev/null)
            if [ "$STATUS" != "running" ]; then
              echo "FAIL: poly-bot is $STATUS"
              exit 1
            fi
            echo "poly-bot: running"
            DASH=$(sudo docker inspect poly-dash --format '{{.State.Status}}' 2>/dev/null || echo "not found")
            echo "poly-dash: $DASH"
            echo "SMOKE TEST PASSED"
        env:
          BOT_MODE: ${{ vars.BOT_MODE }}
          BANKROLL: ${{ vars.BANKROLL }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYMARKET_FUNDER: ${{ secrets.POLYMARKET_FUNDER }}
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PUSH_INTERVAL_SEC: ${{ vars.PUSH_INTERVAL_SEC }}
          DEPLOY_SCRIPT: ${{ env.DEPLOY_SCRIPT }}
