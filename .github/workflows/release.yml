name: Release & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync
      - run: |
          cp config.example.yaml config.yaml
          git describe --tags --always > VERSION
      - run: uv run pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ env.CHANGELOG }}

  deploy:
    runs-on: ubuntu-latest
    needs: [test, release]
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BOT_MODE,BANKROLL,POLYMARKET_PRIVATE_KEY,POLYMARKET_FUNDER
          script: |
            cd ~/poly-bot
            git fetch --tags
            git pull origin main

            VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
            echo "Deploying version: $VERSION"

            cp config.example.yaml config.yaml
            if [ -n "$BANKROLL" ]; then
              sed -i 's|bankroll: 10000|bankroll: '"$BANKROLL"'|' config.yaml
            fi
            if [ -n "$POLYMARKET_PRIVATE_KEY" ]; then
              sed -i 's|# polymarket_private_key: ""|polymarket_private_key: "'"$POLYMARKET_PRIVATE_KEY"'"|' config.yaml
            fi
            if [ -n "$POLYMARKET_FUNDER" ]; then
              sed -i 's|# polymarket_funder: ""|polymarket_funder: "'"$POLYMARKET_FUNDER"'"|' config.yaml
            fi

            sudo docker build --build-arg VERSION=$VERSION -t poly-bot:$VERSION -t poly-bot:latest .
            sudo docker stop poly-bot 2>/dev/null || true
            sudo docker rm poly-bot 2>/dev/null || true
            sudo docker run -d --restart=always \
              -v $(pwd)/config.yaml:/app/config.yaml \
              -v $(pwd)/data:/app/data \
              --name poly-bot \
              poly-bot:$VERSION --${BOT_MODE:-paper}
            sleep 5
            sudo docker logs --tail 10 poly-bot
        env:
          BOT_MODE: ${{ vars.BOT_MODE }}
          BANKROLL: ${{ vars.BANKROLL }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYMARKET_FUNDER: ${{ secrets.POLYMARKET_FUNDER }}
