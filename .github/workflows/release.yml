name: Release & Deploy

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "## Changes
          ${NOTES}"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, release]
    steps:
      - uses: actions/checkout@v5
      - name: Read deploy script
        run: echo "DEPLOY_SCRIPT=$(cat .github/deploy.sh | base64 -w0)" >> $GITHUB_ENV
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BOT_MODE,BANKROLL,POLYMARKET_PRIVATE_KEY,POLYMARKET_FUNDER,GITHUB_TOKEN,GITHUB_REPO,PUSH_INTERVAL_SEC,DEPLOY_SCRIPT
          script: |
            echo "$DEPLOY_SCRIPT" | base64 -d | bash
        env:
          BOT_MODE: ${{ vars.BOT_MODE }}
          BANKROLL: ${{ vars.BANKROLL }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYMARKET_FUNDER: ${{ secrets.POLYMARKET_FUNDER }}
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PUSH_INTERVAL_SEC: ${{ vars.PUSH_INTERVAL_SEC }}
          DEPLOY_SCRIPT: ${{ env.DEPLOY_SCRIPT }}

  verify:
    needs: deploy
    uses: ./.github/workflows/smoke-test.yml
    secrets: inherit
