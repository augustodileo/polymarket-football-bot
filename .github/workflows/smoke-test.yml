name: Smoke Test

on:
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test deployed bot on GCP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Container Status ==="
            sudo docker ps --filter name=poly-bot --format "{{.Status}} | {{.Image}} | Up {{.RunningFor}}"

            echo ""
            echo "=== Version ==="
            sudo docker exec poly-bot cat /app/VERSION 2>/dev/null || echo "no VERSION file"

            echo ""
            echo "=== Health Check ==="
            # Bot is healthy if it logged in the last 60 seconds
            LAST_LOG=$(sudo docker logs --tail 1 --timestamps poly-bot 2>&1 | head -1)
            echo "Last log: $LAST_LOG"

            # Check container is running
            STATUS=$(sudo docker inspect poly-bot --format '{{.State.Status}}' 2>/dev/null)
            if [ "$STATUS" != "running" ]; then
              echo "FAIL: Container is $STATUS, expected running"
              exit 1
            fi

            echo ""
            echo "=== State ==="
            if [ -f ~/poly-bot/data/paper/state.json ]; then
              cat ~/poly-bot/data/paper/state.json | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            print(f'Open: {len(d.get(\"open_positions\", {}))}')
            print(f'P&L: \${d.get(\"cumulative_pnl\", 0):+.2f}')
            print(f'Record: {d.get(\"cumulative_wins\", 0)}W-{d.get(\"cumulative_losses\", 0)}L')
            "
            else
              echo "No state file (fresh start)"
            fi

            echo ""
            echo "=== Recent Logs ==="
            sudo docker logs --tail 5 poly-bot 2>&1

            echo ""
            echo "SMOKE TEST PASSED"
