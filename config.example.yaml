# ============================================================
# Polymarket Football Bot — Configuration
# ============================================================
# Copy this file to config.yaml and edit:
#   cp config.example.yaml config.yaml

# --- Bankroll ---
bankroll: 10000

# --- Polymarket Wallet (only needed for --live mode) ---
# Uncomment and fill in for live trading:
# polymarket_private_key: "your_hex_key_without_0x"
# polymarket_funder: "0xYourWalletAddress"

# --- Risk Limits ---
risk:
  max_daily_loss: 0              # 0 = disabled (no daily loss limit)
  max_single_stake: 1000
  max_concurrent_positions: 5
  min_edge_pct: 0
  kelly_fraction: 0.25

# --- Strategy ---
strategy:
  min_minute: 80
  pre_fetch_minute: 78
  poll_interval_sec: 30

# --- Tier Mismatch (pre-match only) ---
tier_mismatch:
  enabled: true
  min_favorite_prob: 0.70
  max_underdog_prob: 0.15
  pre_match: true
  pre_match_bet_minutes_before: 30
  pre_match_lookahead_hours: 24     # only schedule matches within this window (default 24h)
  pre_match_min_edge_pct: 0
  pre_match_kelly_fraction: 0.50    # higher Kelly for safer pre-match bets (default 25%)

# --- Auto Redemption ---
auto_redeem: true

# --- Leagues ---
leagues:
